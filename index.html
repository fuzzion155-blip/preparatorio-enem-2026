<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Saiba Mais</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 400px;
            margin: 60px auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #333;
        }

        p {
            color: #555;
            font-size: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: #25D366;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1ebe5d;
        }

        .obs {
            font-size: 12px;
            color: #777;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Quer saber mais?</h1>
        <p>Deixe seu telefone abaixo que eu entro em contato e explico tudo sobre o produto.</p>

        <form action="https://wa.me/55SEUNUMEROAQUI" method="get" target="_blank">
            <input type="text" name="text" placeholder="DDD + número (ex: 11999999999)" required>
            <button type="submit">Quero receber informações</button>
        </form>

        <p class="obs">Seus dados estão seguros. Sem spam.</p>
    </div>

</body>
</html>
